<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marriage Bureau</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>
        <img src="favicon.ico" alt="Logo" style="height:50px; vertical-align:middle; margin-right:12px; border-radius:50%;">
        Jesus Youth Loreto - Marriage Bureau
    </h1>

    <div class="filters">

        <input type="text" id="search" placeholder="Search by name">

        <select id="genderFilter">
            <option value="">All Genders</option>
        </select>

        <!-- Caste Dropdown (populated from data) -->
        <div class="dropdown-filter">
            <button class="dropdown-btn" onclick="toggleDropdown('casteDropdown', this)">
                Caste <span class="arrow">▾</span>
            </button>
            <div class="dropdown-menu" id="casteDropdown"></div>
        </div>

        <!-- Education Dropdown (populated from data) -->
        <div class="dropdown-filter">
            <button class="dropdown-btn" onclick="toggleDropdown('educationDropdown', this)">
                Education <span class="arrow">▾</span>
            </button>
            <div class="dropdown-menu" id="educationDropdown"></div>
        </div>

        <!-- Employment Dropdown (populated from data) -->
        <div class="dropdown-filter">
            <button class="dropdown-btn" onclick="toggleDropdown('employmentDropdown', this)">
                Employment <span class="arrow">▾</span>
            </button>
            <div class="dropdown-menu" id="employmentDropdown"></div>
        </div>

        <input type="number" id="minAge" placeholder="Min Age">
        <input type="number" id="maxAge" placeholder="Max Age">

        <select id="sortBy">
            <option value="newest">Newest Profiles</option>
            <option value="youngest">Youngest First</option>
            <option value="oldest">Oldest First</option>
            <option value="az">Name A-Z</option>
            <option value="za">Name Z-A</option>
        </select>

    </div>

    <div id="profiles"></div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
