<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marriage Bureau</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Our Lady of Loreto Church - Marriage Bureau</h1>

<div class="filters">

    <input
        type="text"
        id="search"
        placeholder="Search by name">

    <select id="genderFilter">
        <option value="">All Genders</option>
    </select>

<div class="filter-group">
    <strong>Caste</strong>

    <label>
        <input type="checkbox"
        class="casteCheck"
        value="Latin Catholic">

        Latin Catholic
    </label>

    <label>
        <input type="checkbox"
        class="casteCheck"
        value="Anglo Indian">

        Anglo Indian
    </label>
</div>
<div class="filter-group">
    <strong>Education</strong>

    <label><input type="checkbox" class="educationCheck" value="Lower than SSLC"> Lower than SSLC</label>

    <label><input type="checkbox" class="educationCheck" value="SSLC"> SSLC</label>

    <label><input type="checkbox" class="educationCheck" value="+2"> +2</label>

    <label><input type="checkbox" class="educationCheck" value="Diploma"> Diploma</label>

    <label><input type="checkbox" class="educationCheck" value="Degree"> Degree</label>

    <label><input type="checkbox" class="educationCheck" value="PG"> PG</label>

    <label><input type="checkbox" class="educationCheck" value="PHD"> PHD</label>
</div>
<div class="filter-group">
    <strong>Employment</strong>

    <label>
        <input type="checkbox"
        class="employmentCheck"
        value="Employed">

        Employed
    </label>

    <label>
        <input type="checkbox"
        class="employmentCheck"
        value="Unemployed">

        Unemployed
    </label>
</div>

    <input
        type="number"
        id="minAge"
        placeholder="Min Age">

    <input
        type="number"
        id="maxAge"
        placeholder="Max Age">

    <select id="sortBy">
        <option value="newest">Newest Profiles</option>
        <option value="youngest">Youngest First</option>
        <option value="oldest">Oldest First</option>
        <option value="az">Name A-Z</option>
        <option value="za">Name Z-A</option>
    </select>

</div>

<div id="profiles"></div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <span id="closeModal">&times;</span>

        <div id="modalBody"></div>
    </div>
</div>

    <div id="profiles"></div>

    <script src="script.js"></script>

</body>

</html>
